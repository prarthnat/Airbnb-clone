<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="100%" height="100%">
  <defs>
    <linearGradient id="checkCircle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80" />
      <stop offset="50%" stop-color="#22C55E" />
      <stop offset="100%" stop-color="#15803D" />
    </linearGradient>
    <radialGradient id="checkHighlight" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#86EFAC" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>
  </defs>

  <!-- Ground drop shadow -->
  <ellipse cx="24" cy="43" rx="14" ry="3" fill="#000000" opacity="0.18" />

  <!-- Main 3D green sphere/circle -->
  <circle cx="24" cy="24" r="18" fill="url(#checkCircle)" />
  <circle cx="24" cy="24" r="18" fill="url(#checkHighlight)" />

  <!-- Inner border/bevel shadow -->
  <circle cx="24" cy="24" r="18" fill="none" stroke="#146C43" stroke-width="1.2" opacity="0.4" />

  <!-- Thick 3D white checkmark -->
  <path d="M15 24 L21 30 L33 17" fill="none" stroke="#146C43" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.25" transform="translate(0, 1.5)" />
  <path d="M15 24 L21 30 L33 17" fill="none" stroke="url(#markGrad)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
</svg>
