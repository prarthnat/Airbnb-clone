<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="100%" height="100%">
  <defs>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A5B32" />
      <stop offset="25%" stop-color="#C27A4A" />
      <stop offset="50%" stop-color="#AF6B3E" />
      <stop offset="75%" stop-color="#C27A4A" />
      <stop offset="100%" stop-color="#804824" />
    </linearGradient>
    <linearGradient id="woodInside" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6E3D1E" />
      <stop offset="100%" stop-color="#9A5B32" />
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5CE1E6" />
      <stop offset="50%" stop-color="#38B6FF" />
      <stop offset="100%" stop-color="#0077E6" />
    </linearGradient>
    <linearGradient id="bandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#556068" />
      <stop offset="30%" stop-color="#8A9BA8" />
      <stop offset="50%" stop-color="#CFDBE6" />
      <stop offset="80%" stop-color="#6E7D8A" />
      <stop offset="100%" stop-color="#404B52" />
    </linearGradient>
    <linearGradient id="steamGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Steam curls -->
  <path d="M16 16 C14 12, 18 8, 16 4" fill="none" stroke="url(#steamGrad)" stroke-width="2.5" stroke-linecap="round" />
  <path d="M24 14 C22 10, 26 6, 24 2" fill="none" stroke="url(#steamGrad)" stroke-width="2.5" stroke-linecap="round" />
  <path d="M32 15 C30 11, 34 7, 32 3" fill="none" stroke="url(#steamGrad)" stroke-width="2.5" stroke-linecap="round" />

  <!-- Outer wooden tub body -->
  <path d="M6 22 L8 42 C8 44.2 16 46 24 46 C32 46 40 44.2 40 42 L42 22 Z" fill="url(#woodGrad)" />

  <!-- Vertical plank lines -->
  <path d="M12 23 L13.5 44 M18 24 L19 45.5 M24 24 L24 46 M30 24 L29 45.5 M36 23 L34.5 44" stroke="#6E3D1E" stroke-width="0.8" opacity="0.6" />

  <!-- Metal bands around tub -->
  <path d="M7 28 C15 31 33 31 41 28" fill="none" stroke="url(#bandGrad)" stroke-width="3" />
  <path d="M7.7 37 C15 40 33 40 40.3 37" fill="none" stroke="url(#bandGrad)" stroke-width="3" />

  <!-- Tub rim shadow and interior -->
  <ellipse cx="24" cy="22" rx="18" ry="7" fill="url(#woodInside)" />
  
  <!-- Water inside -->
  <ellipse cx="24" cy="23" rx="16" ry="5.5" fill="url(#waterGrad)" />
  
  <!-- Water ripples / highlight -->
  <ellipse cx="21" cy="22" rx="10" ry="2.5" fill="#FFFFFF" opacity="0.3" />
  
  <!-- Wooden rim border -->
  <ellipse cx="24" cy="22" rx="18" ry="7" fill="none" stroke="url(#woodGrad)" stroke-width="2.5" />
</svg>
