<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="100%" height="100%">
  <defs>
    <linearGradient id="bucketGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CBD5E1" />
      <stop offset="25%" stop-color="#F8FAFC" />
      <stop offset="60%" stop-color="#E2E8F0" />
      <stop offset="90%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#64748B" />
    </linearGradient>
    <linearGradient id="bucketRim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>
    <linearGradient id="paintRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF5252" />
      <stop offset="50%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>
    <linearGradient id="handleMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8" />
      <stop offset="50%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
  </defs>

  <!-- Metal bail handle arc behind/above -->
  <path d="M10 20 C10 8, 38 8, 38 20" fill="none" stroke="url(#handleMetal)" stroke-width="2.2" stroke-linecap="round" />

  <!-- Bucket cylinder body -->
  <path d="M11 20 L13 42 C13 44.5 18 46 24 46 C30 46 35 44.5 35 42 L37 20 Z" fill="url(#bucketGrad)" />

  <!-- Bottom rim shadow -->
  <ellipse cx="24" cy="42" rx="11" ry="3.5" fill="#475569" opacity="0.3" />

  <!-- Bucket interior shadow -->
  <ellipse cx="24" cy="20" rx="13" ry="5.5" fill="#475569" />

  <!-- Red paint inside bucket -->
  <ellipse cx="24" cy="21" rx="12" ry="4.5" fill="url(#paintRed)" />

  <!-- Bucket top rim -->
  <ellipse cx="24" cy="20" rx="13" ry="5.5" fill="none" stroke="url(#bucketRim)" stroke-width="2.5" />

  <!-- Red paint dripping over rim -->
  <path d="M14 21 C15 26, 17 29, 18.5 29 C20 29, 20.5 24, 22 24 C23.5 24, 24.5 32, 26.5 32 C28.5 32, 29 25, 31 25 C32.5 25, 33.5 27, 34 23" fill="none" stroke="url(#paintRed)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M14 21 Q18 29 18.5 29 Q21 29 22 24 Q24 32 26.5 32 Q29 32 31 25 Q33 28 34 22 L34 20 L14 20 Z" fill="url(#paintRed)" />

  <!-- Paint brush/roller handle angled inside -->
  <path d="M28 18 L36 6" stroke="#B45309" stroke-width="3.5" stroke-linecap="round" />
  <rect x="33" y="4" width="6" height="4" rx="1" fill="#D97706" transform="rotate(-56 36 6)" />
</svg>
