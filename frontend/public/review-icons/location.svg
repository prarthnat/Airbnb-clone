<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="100%" height="100%">
  <defs>
    <radialGradient id="pinBody" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FF5A7E" />
      <stop offset="45%" stop-color="#FF385C" />
      <stop offset="85%" stop-color="#E11D48" />
      <stop offset="100%" stop-color="#BE123C" />
    </radialGradient>
    <radialGradient id="pinCore" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="70%" stop-color="#F1F5F9" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </radialGradient>
  </defs>

  <!-- Ground drop shadow -->
  <ellipse cx="24" cy="43" rx="8" ry="2.5" fill="#000000" opacity="0.22" />

  <!-- Pin outer teardrop shape -->
  <path d="M24 6 C15.2 6, 8 13.2, 8 22 C8 32, 21 42, 23.3 43.6 C23.7 43.9, 24.3 43.9, 24.7 43.6 C27 42, 40 32, 40 22 C40 13.2, 32.8 6, 24 6 Z" fill="url(#pinBody)" />

  <!-- Inner circular core cutout -->
