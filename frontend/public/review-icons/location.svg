  <!-- Core shadow rim -->
  <circle cx="24" cy="21" r="7" fill="none" stroke="#BE123C" stroke-width="0.8" opacity="0.3" />

  <!-- Glossy highlight on top left of pin -->
  <path d="M14 16 C16 11, 20 8.5, 26 8 C20 8.5, 14.5 12, 13 18 C13 17, 13.5 16.5, 14 16 Z" fill="#FFFFFF" opacity="0.45" />
</svg>
