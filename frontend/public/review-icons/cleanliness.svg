<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="100%" height="100%">
  <defs>
    <linearGradient id="blueBucket" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38B6FF" />
      <stop offset="35%" stop-color="#0284C7" />
      <stop offset="70%" stop-color="#0369A1" />
      <stop offset="100%" stop-color="#075985" />
    </linearGradient>
    <linearGradient id="bucketTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7DD3FC" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="sprayBottle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="60%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </linearGradient>
    <linearGradient id="sprayNozzle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF5252" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="spongeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047" />
      <stop offset="100%" stop-color="#EAB308" />
    </linearGradient>
  </defs>

  <!-- Metal handle arc -->
  <path d="M10 22 C10 10, 38 10, 38 22" fill="none" stroke="#94A3B8" stroke-width="2.2" stroke-linecap="round" />

  <!-- Spray bottle sticking out of bucket -->
  <!-- Bottle neck and body -->
  <rect x="17" y="10" width="7" height="16" rx="2" fill="url(#sprayBottle)" transform="rotate(-10 20.5 18)" />
  <rect x="19" y="7" width="3" height="4" fill="#94A3B8" transform="rotate(-10 20.5 9)" />
  <!-- Red spray head -->
  <path d="M16 5 L24 3.5 L24 7 L16 8.5 Z" fill="url(#sprayNozzle)" />
  <path d="M14 6 L16 5 L16 8.5 L14 8 Z" fill="#991B1B" />

  <!-- Yellow sponge/towel sticking out on right -->
  <rect x="26" y="14" width="10" height="12" rx="3" fill="url(#spongeGrad)" transform="rotate(15 31 20)" />
  <rect x="25.5" y="13.5" width="10" height="3" rx="1.5" fill="#15803D" transform="rotate(15 31 20)" />

  <!-- Bucket main body cylinder -->
  <path d="M11 22 L13.5 43 C13.5 45.2 18 46.5 24 46.5 C30 46.5 34.5 45.2 34.5 43 L37 22 Z" fill="url(#blueBucket)" />

  <!-- Bucket top oval opening / rim -->
  <ellipse cx="24" cy="22" rx="13" ry="5.5" fill="#0369A1" />
  <ellipse cx="24" cy="22" rx="13" ry="5.5" fill="none" stroke="url(#bucketTop)" stroke-width="2.5" />

  <!-- Bucket highlight reflection -->
  <path d="M14 26 L15.5 41" stroke="#7DD3FC" stroke-width="1.8" stroke-linecap="round" opacity="0.4" />
</svg>
